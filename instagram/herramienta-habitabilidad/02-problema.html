<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG — Herramienta Habitabilidad 02</title>
<style>
  @font-face { font-family:'Space Grotesk'; src:url('../../public/fonts/SpaceGrotesk-Regular.ttf'); font-weight:400; }
  @font-face { font-family:'Space Grotesk'; src:url('../../public/fonts/SpaceGrotesk-Light.ttf'); font-weight:300; }
  @font-face { font-family:'Space Grotesk'; src:url('../../public/fonts/SpaceGrotesk-Bold.ttf'); font-weight:700; }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { background:#F5F0E8; }
  @media (max-width:1080px) { body { zoom: calc(100vw / 1080); } }

  body {
    width:1080px; height:1080px;
    background:#F5F0E8;
    font-family:'Space Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  .header {
    display:flex; align-items:center; gap:18px;
    padding:64px 80px 0;
  }
  .logo-text {
    font-family:'Space Grotesk',sans-serif;
    font-size:22px; font-weight:400;
    letter-spacing:0.12em; text-transform:uppercase;
    color:rgba(26,52,153,0.4);
  }

  .slide-num {
    position:absolute; top:68px; right:80px;
    font-family:'Space Grotesk',sans-serif;
    font-size:18px; font-weight:400;
    letter-spacing:0.06em;
    color:#C0321A;
  }

  .content {
    flex:1;
    display:flex; flex-direction:column;
    justify-content:center;
    padding:0 80px;
    max-width:880px;
  }

  .accent-bar {
    width:48px; height:3px;
    background:#C0321A;
    margin-bottom:40px;
  }

  .body-text {
    font-size:40px; font-weight:300;
    line-height:1.55;
    color:#1A1A1A;
    margin-bottom:28px;
  }

  .body-text strong {
    font-weight:700;
    color:#1A3499;
  }

  .footer {
    display:flex; justify-content:space-between; align-items:center;
    padding:0 80px 64px;
  }
  .footer-territory {
    font-family:'Space Grotesk',sans-serif;
    font-size:17px; font-weight:400;
    letter-spacing:0.12em; text-transform:uppercase;
    color:rgba(26,26,26,0.2);
  }
  .footer-year {
    font-family:'Space Grotesk',sans-serif;
    font-size:17px; font-weight:400;
    color:rgba(26,26,26,0.15);
  }
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 44 44" width="44" height="44" aria-hidden="true">
    <rect width="44" height="44" rx="4" fill="rgba(26,52,153,0.08)"/>
    <path d="M13 7L13 31L33 31" stroke="#1A3499" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="13" cy="31" r="2.8" fill="#C0321A"/>
  </svg>
  <span class="logo-text">Entrelampistas</span>
</div>

<span class="slide-num">02 / 05</span>

<div class="content">
  <div class="accent-bar"></div>
  <p class="body-text">
    Revisamos la instalacion electrica.<br>
    Revisamos el aceite del coche.<br>
    Revisamos los dientes cada ano.
  </p>
  <p class="body-text">
    El lugar donde pasamos <strong>7 horas al dia</strong> pensando, decidiendo y sintiendo — ese no lo revisa nadie.
  </p>
</div>

<div class="footer">
  <span class="footer-territory">Habitabilidad digital</span>
  <span class="footer-year">2026</span>
</div>

</body>
</html>
