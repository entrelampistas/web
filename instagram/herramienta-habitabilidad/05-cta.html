<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG — Herramienta Habitabilidad 05</title>
<style>
  @font-face { font-family:'Space Grotesk'; src:url('../../public/fonts/SpaceGrotesk-Regular.ttf'); font-weight:400; }
  @font-face { font-family:'Space Grotesk'; src:url('../../public/fonts/SpaceGrotesk-Light.ttf'); font-weight:300; }
  @font-face { font-family:'Space Grotesk'; src:url('../../public/fonts/SpaceGrotesk-Bold.ttf'); font-weight:700; }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { background:#1A1A1A; }
  @media (max-width:1080px) { body { zoom: calc(100vw / 1080); } }

  body {
    width:1080px; height:1080px;
    background:#1A1A1A;
    font-family:'Space Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
    overflow:hidden;
    position:relative;
  }

  .header {
    display:flex; align-items:center; gap:18px;
    padding:64px 80px 0;
  }
  .logo-text {
    font-family:'Space Grotesk',sans-serif;
    font-size:22px; font-weight:400;
    letter-spacing:0.12em; text-transform:uppercase;
    color:rgba(245,240,232,0.35);
  }

  .slide-num {
    position:absolute; top:68px; right:80px;
    font-family:'Space Grotesk',sans-serif;
    font-size:18px; font-weight:400;
    letter-spacing:0.06em;
    color:#C0321A;
  }

  .content {
    flex:1;
    display:flex; flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 100px;
  }

  .accent-bar {
    width:48px; height:3px;
    background:#C0321A;
    margin-bottom:48px;
  }

  .question {
    font-size:52px; font-weight:300;
    line-height:1.35;
    color:#F5F0E8;
    margin-bottom:56px;
    max-width:760px;
  }

  .cta-box {
    display:inline-block;
    background:#1A3499;
    padding:24px 56px;
    border-radius:4px;
    margin-bottom:28px;
  }
  .cta-text {
    font-family:'Space Grotesk',sans-serif;
    font-size:24px; font-weight:400;
    letter-spacing:0.1em; text-transform:uppercase;
    color:#F5F0E8;
  }

  .cta-note {
    font-size:22px; font-weight:300;
    color:rgba(245,240,232,0.35);
  }

  .footer {
    display:flex; justify-content:space-between; align-items:center;
    padding:0 80px 64px;
  }
  .footer-url {
    font-family:'Space Grotesk',sans-serif;
    font-size:20px; font-weight:400;
    letter-spacing:0.08em;
    color:rgba(245,240,232,0.2);
  }
  .footer-arrow {
    font-size:24px;
    color:rgba(245,240,232,0.3);
  }
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 44 44" width="44" height="44" aria-hidden="true">
    <rect width="44" height="44" rx="4" fill="rgba(245,240,232,0.06)"/>
    <path d="M13 7L13 31L33 31" stroke="#F5F0E8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="13" cy="31" r="2.8" fill="#C0321A"/>
  </svg>
  <span class="logo-text">Entrelampistas</span>
</div>

<span class="slide-num">05 / 05</span>

<div class="content">
  <div class="accent-bar"></div>
  <p class="question">Si tu entorno digital fuera un espacio fisico, ya habrias llamado a alguien para revisarlo.</p>

  <div class="cta-box">
    <span class="cta-text">Hacer el diagnostico</span>
  </div>
  <p class="cta-note">3 minutos. Sin registro. Link en bio.</p>
</div>

<div class="footer">
  <span class="footer-url">entrelampistas.com</span>
  <span class="footer-arrow">&nearr;</span>
</div>

</body>
</html>
