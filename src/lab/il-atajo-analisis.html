<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atajo heuristico vs Analisis completo — Entrelampistas Lab</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #E8E2D8;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .frame {
      background: #F5F0E8;
      border-radius: 6px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      padding: 2rem;
      max-width: 860px;
      width: 100%;
    }
    svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="frame">
    <svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Paper texture filter -->
        <filter id="paperTexture" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
          <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
          <feComponentTransfer in="textured">
            <feFuncA type="linear" slope="1"/>
          </feComponentTransfer>
        </filter>

        <!-- Red glow for shortcut endpoint -->
        <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feFlood flood-color="#E8593C" flood-opacity="0.35" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge>
            <feMergeNode in="glow"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Hatching pattern for false-certainty zone -->
        <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke="#1A1A2E" stroke-width="0.5"/>
        </pattern>
      </defs>

      <!-- Background with paper texture -->
      <rect width="800" height="440" fill="#F5F0E8" filter="url(#paperTexture)"/>

      <!-- Warm zone around shortcut path -->
      <ellipse cx="250" cy="140" rx="180" ry="100" fill="#FBEAE8" opacity="0.2"/>

      <!-- Cool zone around analysis path -->
      <ellipse cx="500" cy="300" rx="250" ry="100" fill="#E8EEF8" opacity="0.2"/>

      <!-- Hatching in upper-right zone (false certainty) -->
      <rect x="300" y="40" width="200" height="120" rx="20" fill="url(#hatch)" opacity="0.04"/>

      <!-- Dashed connector: shortcut to analysis endpoint -->
      <path d="M350,100 C450,120 550,200 700,280"
            stroke="#B0A890" stroke-width="1" fill="none"
            stroke-dasharray="4 6" opacity="0.3"/>

      <!-- UPPER PATH: Shortcut (red) -->
      <path d="M100,220 C150,180 250,90 350,100"
            stroke="#E8593C" stroke-width="1" fill="none"/>

      <!-- Small red nodes along shortcut path -->
      <circle cx="160" cy="185" r="4" fill="#E8593C" opacity="0.7"/>
      <circle cx="260" cy="105" r="5" fill="#E8593C" opacity="0.7"/>

      <!-- Shortcut endpoint with red glow -->
      <circle cx="350" cy="100" r="8" fill="#E8593C" filter="url(#redGlow)"/>

      <!-- LOWER PATH: Analysis (navy) -->
      <path d="M100,220 C150,280 250,340 350,300 S500,250 600,290 S680,270 700,280"
            stroke="#1A1A2E" stroke-width="1" fill="none"/>

      <!-- Small navy nodes along analysis path -->
      <circle cx="170" cy="275" r="4" fill="#1A1A2E" opacity="0.6"/>
      <circle cx="270" cy="325" r="5" fill="#1A1A2E" opacity="0.6"/>
      <circle cx="380" cy="290" r="6" fill="#1A1A2E" opacity="0.6"/>
      <circle cx="510" cy="265" r="5" fill="#1A1A2E" opacity="0.6"/>
      <circle cx="620" cy="290" r="4" fill="#1A1A2E" opacity="0.6"/>

      <!-- Analysis endpoint -->
      <circle cx="700" cy="280" r="8" fill="#1A1A2E"/>

      <!-- Entry node (large) -->
      <circle cx="100" cy="220" r="10" fill="#1A1A2E"/>

      <!-- Labels -->
      <!-- ENTRADA label -->
      <text x="100" y="252" text-anchor="middle"
            font-family="system-ui, -apple-system, sans-serif"
            font-size="11" letter-spacing="0.08em" text-transform="uppercase"
            fill="#999" style="text-transform: uppercase">ENTRADA</text>

      <!-- Atajo heuristico -->
      <text x="280" y="70"
            font-family="'Newsreader', 'Georgia', serif"
            font-size="24" font-style="italic" fill="#E8593C">Atajo heur&#xED;stico</text>

      <!-- Analisis completo -->
      <text x="500" y="350"
            font-family="'Newsreader', 'Georgia', serif"
            font-size="24" font-style="italic" fill="#1A1A2E">An&#xE1;lisis completo</text>

      <!-- Caption -->
      <text x="400" y="420" text-anchor="middle"
            font-family="'Newsreader', 'Georgia', serif"
            font-size="14" font-style="italic" fill="#666">Conocer los propios atajos no elimina el error. Pero crea una distancia m&#xED;nima.</text>
    </svg>
  </div>
</body>
</html>
