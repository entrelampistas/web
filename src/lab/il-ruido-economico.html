<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IL — Ruido económico</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #E8E3DB; }
    svg { max-width: 100%; height: auto; }
  </style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <!-- Paper texture filter -->
    <filter id="paperTexture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="8" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1" intercept="0"/>
      </feComponentTransfer>
    </filter>

    <!-- Hatching pattern for noise zone -->
    <pattern id="hatching" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(35)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1A1A2E" stroke-width="0.4" stroke-opacity="0.04"/>
    </pattern>

    <!-- Red glow for protagonist node -->
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#E8593C" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#F5F0E8" filter="url(#paperTexture)"/>

  <!-- Hatching in upper area — the noise zone -->
  <rect x="0" y="0" width="800" height="250" fill="url(#hatching)"/>

  <!-- === SCATTERED DATA FRAGMENTS === -->

  <!-- PIB -->
  <rect x="80" y="60" width="120" height="60" rx="8" fill="#1A1A2E" fill-opacity="0.06" stroke="#1A1A2E" stroke-width="0.6" stroke-opacity="0.35"/>
  <circle cx="140" cy="90" r="3" fill="#1A1A2E" opacity="0.4"/>
  <text x="140" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999" dy="12">PIB</text>

  <!-- Inflación -->
  <rect x="250" y="40" width="140" height="55" rx="10" fill="#1A1A2E" fill-opacity="0.05" stroke="#1A1A2E" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="320" cy="67" r="3" fill="#1A1A2E" opacity="0.4"/>
  <text x="320" y="78" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999">Inflación</text>

  <!-- Tipos -->
  <rect x="450" y="70" width="100" height="50" rx="8" fill="#1A1A2E" fill-opacity="0.07" stroke="#1A1A2E" stroke-width="0.75" stroke-opacity="0.4"/>
  <circle cx="500" cy="95" r="3" fill="#1A1A2E" opacity="0.4"/>
  <text x="500" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999">Tipos</text>

  <!-- Aranceles -->
  <rect x="600" y="50" width="130" height="58" rx="10" fill="#1A1A2E" fill-opacity="0.06" stroke="#1A1A2E" stroke-width="0.6" stroke-opacity="0.35"/>
  <circle cx="665" cy="79" r="3" fill="#1A1A2E" opacity="0.4"/>
  <text x="665" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999">Aranceles</text>

  <!-- Empleo -->
  <rect x="120" y="170" width="130" height="55" rx="10" fill="#1A1A2E" fill-opacity="0.08" stroke="#1A1A2E" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="185" cy="197" r="3" fill="#1A1A2E" opacity="0.4"/>
  <text x="185" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999">Empleo</text>

  <!-- Deuda -->
  <rect x="320" y="160" width="110" height="60" rx="12" fill="#1A1A2E" fill-opacity="0.05" stroke="#1A1A2E" stroke-width="0.75" stroke-opacity="0.4"/>
  <circle cx="375" cy="190" r="3" fill="#1A1A2E" opacity="0.4"/>
  <text x="375" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999">Deuda</text>

  <!-- IPC -->
  <rect x="490" y="175" width="90" height="48" rx="8" fill="#1A1A2E" fill-opacity="0.07" stroke="#1A1A2E" stroke-width="0.6" stroke-opacity="0.35"/>
  <circle cx="535" cy="199" r="3" fill="#1A1A2E" opacity="0.4"/>
  <text x="535" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#999">IPC</text>

  <!-- === DASHED BEZIER CURVES — FAILING CONNECTIONS === -->

  <!-- PIB to Inflación — fading -->
  <path d="M200,90 C225,85 230,65 250,67" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.3"/>

  <!-- Inflación to Tipos — fading more -->
  <path d="M390,67 C410,70 430,80 450,88" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.25"/>

  <!-- Tipos to Aranceles — fading -->
  <path d="M550,95 C565,88 580,78 600,79" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.2"/>

  <!-- Empleo to Deuda — incomplete -->
  <path d="M250,197 C275,195 290,192 310,190" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.25"/>

  <!-- Deuda to IPC — barely visible -->
  <path d="M430,190 C450,193 470,196 490,199" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.15"/>

  <!-- PIB down to Empleo — incomplete, fades -->
  <path d="M140,120 C145,140 155,155 170,170" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.2"/>

  <!-- Inflación down to Deuda — fading -->
  <path d="M320,95 C330,115 345,140 360,160" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.18"/>

  <!-- === FAILED CONNECTION FROM FRAGMENTS TO "TU ECONOMÍA REAL" === -->

  <!-- Long dashed curve from data zone trying to reach the red zone — breaks apart -->
  <path d="M375,220 C400,260 450,290 500,310" fill="none" stroke="#B0A890" stroke-width="1" stroke-dasharray="5 4" stroke-opacity="0.22"/>
  <path d="M510,318 C520,325 530,330 538,335" fill="none" stroke="#B0A890" stroke-width="0.8" stroke-dasharray="4 6" stroke-opacity="0.12"/>

  <!-- Another failed attempt from right side -->
  <path d="M535,223 C550,260 570,285 580,305" fill="none" stroke="#B0A890" stroke-width="0.8" stroke-dasharray="5 4" stroke-opacity="0.18"/>
  <path d="M583,312 C588,320 592,325 595,330" fill="none" stroke="#B0A890" stroke-width="0.6" stroke-dasharray="3 7" stroke-opacity="0.08"/>

  <!-- === "TU ECONOMÍA REAL" ZONE === -->

  <!-- Red rectangle -->
  <rect x="540" y="300" width="200" height="100" rx="12" fill="#E8593C" fill-opacity="0.08" stroke="#E8593C" stroke-width="0.75"/>

  <!-- Red protagonist node with glow -->
  <circle cx="640" cy="350" r="10" fill="#E8593C" fill-opacity="0.9" filter="url(#redGlow)"/>

  <!-- Label inside red zone -->
  <text x="640" y="378" text-anchor="middle" font-family="'Newsreader', 'Georgia', serif" font-size="16" fill="#E8593C">Tu economía real</text>

  <!-- === LABELS === -->

  <!-- Hero label -->
  <text x="100" y="320" font-family="'Newsreader', 'Georgia', serif" font-size="42" font-style="italic" fill="#1A1A2E">Ruido</text>

  <!-- Caption -->
  <text x="100" y="390" font-family="'Newsreader', 'Georgia', serif" font-size="14" font-style="italic" fill="#666">Los datos llegan sin jerarquía, sin contexto, sin escala</text>

</svg>

</body>
</html>
