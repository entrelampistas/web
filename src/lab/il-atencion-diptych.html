<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IL-03: Atención continua vs capturada</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #F5F0E8; }
    .el-figure { max-width: 800px; width: 100%; padding: 2rem; }
  </style>
</head>
<body>
<figure class="el-figure">
  <svg class="el-diagram" viewBox="0 0 800 480" width="100%" xmlns="http://www.w3.org/2000/svg"
       role="img" aria-label="Comparación entre atención continua fluida y atención capturada fragmentada por notificaciones">

    <defs>
      <filter id="el-paper-3">
        <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" result="noise"/>
        <feDiffuseLighting in="noise" lighting-color="#F5F0E8" surfaceScale="0.025" result="lit">
          <feDistantLight azimuth="45" elevation="60"/>
        </feDiffuseLighting>
        <feComposite in="SourceGraphic" in2="lit" operator="arithmetic" k1="0" k2="1" k3="0.03" k4="0"/>
      </filter>
      <filter id="el-red-glow-3" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0  0 0.3 0 0 0  0 0 0.2 0 0  0 0 0 0.5 0" result="glow"/>
        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <pattern id="el-hatch-3" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(15)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#1A1A2E" stroke-width="0.5"/>
      </pattern>
      <clipPath id="el-hatch-clip-3"><rect x="420" y="60" width="340" height="300"/></clipPath>
    </defs>

    <!-- Background -->
    <rect width="800" height="480" fill="#F5F0E8" filter="url(#el-paper-3)"/>

    <!-- Vertical divider -->
    <line x1="400" y1="50" x2="400" y2="400" stroke="#1A1A2E" stroke-width="0.5" opacity="0.2"/>

    <!-- LEFT: Atención continua — calm blue zone -->
    <rect x="60" y="80" width="300" height="260" rx="0" stroke="#1A1A2E" stroke-width="0.6" fill="#E8EEF8" fill-opacity="0.3"/>

    <!-- Left: smooth flowing curve (continuous attention) -->
    <path d="M100,220 C150,180 200,240 250,200 S320,230 340,210" stroke="#1A1A2E" stroke-width="1" stroke-linecap="round" fill="none"/>

    <!-- Left: nodes along the flow (evenly spaced, calm) -->
    <circle cx="100" cy="220" r="5" fill="#1A1A2E"/>
    <circle cx="170" cy="200" r="5" fill="#1A1A2E"/>
    <circle cx="250" cy="210" r="6" fill="#1A1A2E"/>
    <circle cx="340" cy="210" r="7" fill="#1A1A2E"/>

    <!-- RIGHT: Atención capturada — warm red zone with hatching -->
    <rect x="440" y="80" width="300" height="260" rx="0" stroke="#E8593C" stroke-width="0.6" fill="#FBEAE8" fill-opacity="0.3"/>
    <rect x="420" y="60" width="340" height="300" fill="url(#el-hatch-3)" clip-path="url(#el-hatch-clip-3)" opacity="0.05"/>

    <!-- Right: fragmented interrupted paths (captured attention) -->
    <path d="M480,180 C500,170 510,190 520,175" stroke="#E8593C" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M540,220 C555,210 560,230 570,215" stroke="#E8593C" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M590,190 C610,180 615,200 630,185" stroke="#E8593C" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M650,240 C665,230 670,250 690,235" stroke="#E8593C" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.3"/>

    <!-- Right: scattered red nodes (fragmented, different sizes = chaos) -->
    <circle cx="480" cy="180" r="6" fill="#E8593C" opacity="0.9"/>
    <circle cx="540" cy="220" r="5" fill="#E8593C" opacity="0.7"/>
    <circle cx="590" cy="190" r="4" fill="#E8593C" opacity="0.5"/>
    <circle cx="650" cy="240" r="3" fill="#E8593C" opacity="0.35"/>

    <!-- Right: notification interruptions (small rects) -->
    <rect x="520" y="150" width="40" height="4" rx="2" fill="#E8593C" opacity="0.15"/>
    <rect x="570" y="260" width="50" height="4" rx="2" fill="#E8593C" opacity="0.12"/>
    <rect x="610" y="170" width="35" height="4" rx="2" fill="#E8593C" opacity="0.10"/>
    <rect x="470" y="280" width="45" height="4" rx="2" fill="#E8593C" opacity="0.08"/>

    <!-- Red protagonist node (captured, with glow) -->
    <circle cx="520" cy="300" r="10" fill="#E8593C" filter="url(#el-red-glow-3)"/>

    <!-- Labels -->
    <!-- Left: hero label -->
    <text x="210" y="140" text-anchor="middle" font-family="'Newsreader', Georgia, serif" font-size="28" font-style="italic" fill="#1A1A2E">Continuidad</text>

    <!-- Right: hero label -->
    <text x="590" y="140" text-anchor="middle" font-family="'Newsreader', Georgia, serif" font-size="28" font-style="italic" fill="#E8593C">Fragmentación</text>

    <!-- Category labels -->
    <text x="80" y="72" font-family="'Space Grotesk', sans-serif" font-size="11" letter-spacing="2" fill="#999">ATENCIÓN CONTINUA</text>
    <text x="460" y="72" font-family="'Space Grotesk', sans-serif" font-size="11" letter-spacing="2" fill="#999">ATENCIÓN CAPTURADA</text>

    <!-- Caption -->
    <text x="400" y="440" text-anchor="middle" font-family="'Newsreader', Georgia, serif" font-style="italic" font-size="14" fill="#666">Lo que más vemos es lo que más nos retiene. Espejo y molde al mismo tiempo.</text>

  </svg>
</figure>
<script>document.querySelector('.el-diagram').classList.add('is-visible');</script>
</body>
</html>
