<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero ambient illustration</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #F5F0E8; }
    .hero-demo { position: relative; max-width: 800px; width: 100%; padding: 80px 40px; }
    .hero-ambient { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; pointer-events: none; opacity: 0; animation: ambient-fade 3s ease forwards; }
    @keyframes ambient-fade { to { opacity: 1; } }
    .hero-demo h1 { position: relative; z-index: 1; font-family: 'Newsreader', Georgia, serif; font-size: clamp(2.5rem, 5vw, 3.75rem); font-weight: 700; line-height: 1.05; color: #1A1A18; margin: 0 0 16px 0; }
    .hero-demo p { position: relative; z-index: 1; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: #666; line-height: 1.65; max-width: 40ch; }
  </style>
</head>
<body>
<div class="hero-demo">
  <svg class="hero-ambient" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- Outer dashed rect -->
    <rect x="100" y="60" width="1000" height="480" stroke="#1A1A2E" stroke-width="0.6" stroke-dasharray="12 8" fill="none" opacity="0.05"/>

    <!-- Inner solid rect (offset left-down) -->
    <rect x="280" y="160" width="600" height="300" stroke="#1A1A2E" stroke-width="0.5" fill="none" opacity="0.04"/>

    <!-- Curves (very faint) -->
    <path d="M180,540 C120,400 200,250 450,180" stroke="#B0A890" stroke-width="0.8" fill="none" opacity="0.05" stroke-linecap="round"/>
    <path d="M450,180 C600,100 850,80 1100,60" stroke="#B0A890" stroke-width="0.8" fill="none" opacity="0.04" stroke-linecap="round"/>
    <path d="M180,540 C350,520 550,500 700,540" stroke="#B0A890" stroke-width="0.8" fill="none" opacity="0.04" stroke-linecap="round"/>
    <path d="M580,160 C620,250 750,340 880,300 S800,450 700,540" stroke="#B0A890" stroke-width="0.8" fill="none" opacity="0.05" stroke-linecap="round"/>

    <!-- Navy nodes -->
    <circle cx="550" cy="60" r="5" fill="#1A1A2E" opacity="0.05"/>
    <circle cx="1100" cy="60" r="5" fill="#1A1A2E" opacity="0.04"/>
    <circle cx="450" cy="180" r="5" fill="#1A1A2E" opacity="0.05"/>
    <circle cx="880" cy="300" r="4" fill="#1A1A2E" opacity="0.04"/>
    <circle cx="180" cy="540" r="5" fill="#1A1A2E" opacity="0.05"/>
    <circle cx="700" cy="540" r="4" fill="#1A1A2E" opacity="0.04"/>

    <!-- Red protagonist node -->
    <circle cx="750" cy="260" r="7" fill="#E8593C" opacity="0.06"/>

    <!-- Diagonal hatching (very faint, upper right) -->
    <defs>
      <pattern id="hero-hatch" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(15)">
        <line x1="0" y1="0" x2="0" y2="10" stroke="#1A1A2E" stroke-width="0.4"/>
      </pattern>
      <clipPath id="hero-hatch-clip"><rect x="600" y="60" width="500" height="240"/></clipPath>
    </defs>
    <rect x="100" y="60" width="1000" height="480" fill="url(#hero-hatch)" clip-path="url(#hero-hatch-clip)" opacity="0.025"/>
  </svg>

  <h1>Pensamiento práctico sobre la vida contemporánea.</h1>
  <p>Ideas y herramientas para entender las tecnologías, narrativas y sistemas que influyen en cómo vivimos, pensamos y decidimos.</p>
</div>
</body>
</html>
