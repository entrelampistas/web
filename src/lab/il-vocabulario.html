<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilustración: Vocabulario como herramienta</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #F5F0E8; }
    .el-figure { max-width: 800px; width: 100%; padding: 2rem; }

    /* Animation: initial states */
    .el-diagram .el-zone,
    .el-diagram .el-axis { opacity: 0; transition: opacity 0.8s ease; }

    .el-diagram .el-hatch-area { opacity: 0; transition: opacity 2s ease 0.2s; }

    .el-diagram .el-marker-line {
      transform: scaleY(0); transform-origin: center bottom;
      transition: transform 0.8s cubic-bezier(0.22,1,0.36,1);
    }
    .el-diagram .el-marker-line:nth-of-type(1) { transition-delay: 0.4s; }
    .el-diagram .el-marker-line:nth-of-type(2) { transition-delay: 0.55s; }
    .el-diagram .el-marker-line:nth-of-type(3) { transition-delay: 0.7s; }
    .el-diagram .el-marker-line:nth-of-type(4) { transition-delay: 0.85s; }

    .el-diagram .el-node-navy {
      transform: scale(0); transform-origin: center;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .el-diagram .el-node-navy:nth-of-type(1) { transition-delay: 0.6s; }
    .el-diagram .el-node-navy:nth-of-type(2) { transition-delay: 0.75s; }
    .el-diagram .el-node-navy:nth-of-type(3) { transition-delay: 0.9s; }

    .el-diagram .el-node-blue {
      transform: scale(0); transform-origin: center;
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.0s;
    }

    .el-diagram .el-curve-connect {
      stroke-dasharray: 2000; stroke-dashoffset: 2000;
      transition: stroke-dashoffset 2s cubic-bezier(0.22,1,0.36,1) 0.8s;
    }

    .el-diagram .el-curve-emergence {
      stroke-dasharray: 800; stroke-dashoffset: 800;
      transition: stroke-dashoffset 2.5s cubic-bezier(0.22,1,0.36,1) 0.6s;
    }

    .el-diagram .el-bar {
      transform: scaleX(0); transform-origin: left center;
      transition: transform 1.2s cubic-bezier(0.22,1,0.36,1);
    }
    .el-diagram .el-bar:nth-of-type(1) { transition-delay: 1.2s; }
    .el-diagram .el-bar:nth-of-type(2) { transition-delay: 1.4s; }
    .el-diagram .el-bar:nth-of-type(3) { transition-delay: 1.6s; }
    .el-diagram .el-bar:nth-of-type(4) { transition-delay: 1.8s; }

    .el-diagram .el-label-concept { opacity: 0; transition: opacity 0.6s ease; }
    .el-diagram .el-label-concept:nth-of-type(1) { transition-delay: 1.5s; }
    .el-diagram .el-label-concept:nth-of-type(2) { transition-delay: 1.65s; }
    .el-diagram .el-label-concept:nth-of-type(3) { transition-delay: 1.8s; }

    .el-diagram .el-label-hero { opacity: 0; transition: opacity 0.8s ease 2.0s; }
    .el-diagram .el-label-year { opacity: 0; transition: opacity 0.5s ease 1.5s; }
    .el-diagram .el-label-axis { opacity: 0; transition: opacity 0.6s ease 2.0s; }
    .el-diagram .el-label-caption { opacity: 0; transition: opacity 0.6s ease 2.2s; }

    /* Visible states */
    .el-diagram.is-visible .el-zone,
    .el-diagram.is-visible .el-axis { opacity: 1; }
    .el-diagram.is-visible .el-hatch-area { opacity: 0.04; }
    .el-diagram.is-visible .el-marker-line { transform: scaleY(1); }
    .el-diagram.is-visible .el-node-navy { transform: scale(1); }
    .el-diagram.is-visible .el-node-blue { transform: scale(1); }
    .el-diagram.is-visible .el-curve-connect { stroke-dashoffset: 0; }
    .el-diagram.is-visible .el-curve-emergence { stroke-dashoffset: 0; }
    .el-diagram.is-visible .el-bar { transform: scaleX(1); }
    .el-diagram.is-visible .el-label-concept { opacity: 1; }
    .el-diagram.is-visible .el-label-hero { opacity: 1; }
    .el-diagram.is-visible .el-label-year { opacity: 1; }
    .el-diagram.is-visible .el-label-axis { opacity: 1; }
    .el-diagram.is-visible .el-label-caption { opacity: 1; }
  </style>
</head>
<body>

<figure class="el-figure">
  <svg class="el-diagram" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg"
       role="img" aria-label="Timeline: cómo nombrar conceptos los hace visibles — burbuja de filtros, economía de la atención, enshittification, habitabilidad digital">
    <title>Vocabulario como herramienta — Nombrar vuelve visible</title>

    <defs>
      <filter id="el-paper-v">
        <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" result="noise"/>
        <feDiffuseLighting in="noise" lighting-color="#F5F0E8" surfaceScale="0.025" result="lit">
          <feDistantLight azimuth="45" elevation="60"/>
        </feDiffuseLighting>
        <feComposite in="SourceGraphic" in2="lit" operator="arithmetic" k1="0" k2="1" k3="0.03" k4="0"/>
      </filter>
      <filter id="el-blue-glow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
        <feColorMatrix in="blur" type="matrix"
          values="0.2 0 0 0 0  0.3 0.3 0 0 0  0.8 0 0.8 0 0  0 0 0 0.3 0" result="glow"/>
        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <pattern id="el-hatch-v" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(15)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#1A1A2E" stroke-width="0.5"/>
      </pattern>
      <clipPath id="el-hatch-clip-v">
        <rect x="60" y="100" width="200" height="180"/>
      </clipPath>
    </defs>

    <!-- Background -->
    <rect width="800" height="520" fill="#F5F0E8" filter="url(#el-paper-v)"/>

    <!-- Content zone -->
    <rect class="el-zone" x="60" y="100" width="680" height="280" fill="#F0E8D8" opacity="0.3"/>

    <!-- Hatching (upper-left — the unnamed past) -->
    <rect class="el-hatch-area" x="60" y="100" width="680" height="280"
          fill="url(#el-hatch-v)" clip-path="url(#el-hatch-clip-v)" opacity="0.04"/>

    <!-- Axis (organic, slightly wavy) -->
    <path class="el-axis" d="M120,300 C250,299 450,301 680,300"
          stroke="#1A1A2E" stroke-width="0.8" fill="none" stroke-linecap="round"/>

    <!-- Connection curve (ondulating between nodes) -->
    <path class="el-curve-connect" d="M200,300 C240,282 300,280 340,300 S420,280 480,300 S560,278 620,300"
          stroke="#B0A890" stroke-width="0.8" fill="none" stroke-linecap="round"/>

    <!-- Emergence arc (diagonal dashed — anonymity to visibility) -->
    <path class="el-curve-emergence" d="M130,390 C250,350 450,200 620,130"
          stroke="#B0A890" stroke-width="0.5" stroke-dasharray="4 6" fill="none" opacity="0.4"/>

    <!-- Marker lines (grow from bottom up) -->
    <line class="el-marker-line" x1="200" y1="300" x2="200" y2="160" stroke="#1A1A2E" stroke-width="0.6"/>
    <line class="el-marker-line" x1="340" y1="300" x2="340" y2="155" stroke="#1A1A2E" stroke-width="0.6"/>
    <line class="el-marker-line" x1="480" y1="300" x2="480" y2="150" stroke="#1A1A2E" stroke-width="0.6"/>
    <line class="el-marker-line" x1="620" y1="300" x2="620" y2="130" stroke="#3B4EC4" stroke-width="0.8" stroke-dasharray="6 4"/>

    <!-- Navy nodes -->
    <circle class="el-node-navy" cx="200" cy="300" r="6" fill="#1A1A2E"/>
    <circle class="el-node-navy" cx="340" cy="300" r="6" fill="#1A1A2E"/>
    <circle class="el-node-navy" cx="480" cy="300" r="7" fill="#1A1A2E"/>

    <!-- Blue node (protagonist — 2025) -->
    <circle class="el-node-blue" cx="620" cy="300" r="10" fill="#3B4EC4" filter="url(#el-blue-glow)"/>

    <!-- Visibility bars (grow left to right) -->
    <rect class="el-bar" x="200" y="310" width="60" height="6" rx="2" fill="#B0A890" opacity="0.2"/>
    <rect class="el-bar" x="200" y="322" width="180" height="6" rx="2" fill="#B0A890" opacity="0.3"/>
    <rect class="el-bar" x="200" y="334" width="340" height="6" rx="2" fill="#B0A890" opacity="0.4"/>
    <rect class="el-bar" x="200" y="346" width="420" height="8" rx="2" fill="#3B4EC4" opacity="0.15"/>

    <!-- Concept labels -->
    <text class="el-label-concept" x="200" y="148" text-anchor="middle"
          font-family="'Newsreader', Georgia, serif" font-size="12" fill="#1A1A2E">Burbuja de filtros</text>
    <text class="el-label-concept" x="340" y="143" text-anchor="middle"
          font-family="'Newsreader', Georgia, serif" font-size="12" fill="#1A1A2E">Economía de la atención</text>
    <text class="el-label-concept" x="480" y="138" text-anchor="middle"
          font-family="'Newsreader', Georgia, serif" font-size="13" fill="#1A1A2E">Enshittification</text>

    <!-- Hero label -->
    <text class="el-label-hero" x="620" y="118" text-anchor="middle"
          font-family="'Newsreader', Georgia, serif" font-size="18" fill="#3B4EC4">Habitabilidad digital</text>

    <!-- Year labels -->
    <text class="el-label-year" x="200" y="375" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif" font-size="11" fill="#999">2011</text>
    <text class="el-label-year" x="340" y="375" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif" font-size="11" fill="#999">2014</text>
    <text class="el-label-year" x="480" y="375" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif" font-size="11" fill="#999">2023</text>
    <text class="el-label-year" x="620" y="375" text-anchor="middle"
          font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="500" fill="#3B4EC4">2025</text>

    <!-- Axis labels -->
    <text class="el-label-axis" x="120" y="120"
          font-family="'Newsreader', Georgia, serif" font-style="italic" font-size="14" fill="#3B4EC4">Visible</text>
    <text class="el-label-axis" x="120" y="400"
          font-family="'Newsreader', Georgia, serif" font-style="italic" font-size="13" fill="#999">Sin nombre</text>

    <!-- Caption -->
    <text class="el-label-caption" x="400" y="480" text-anchor="middle"
          font-family="'Newsreader', Georgia, serif" font-style="italic" font-size="14" fill="#666">Nombrar vuelve visible. Lo visible puede discutirse.</text>

  </svg>
</figure>

<script>
  setTimeout(function() {
    document.querySelector('.el-diagram').classList.add('is-visible');
  }, 300);
</script>

</body>
</html>
